<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Laboratorio Clínico</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
     <!-- Titulo de Login -->
  <div class="login-container">
    <div class="login-card">
      <h2>Sistema de Gestión de Pacientes</h2>
      <h3>Laboratorio Clínico</h3>
       <!-- Ingreso de datos de Paciente, admi y doctor -->
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" required placeholder="Ingresa tu correo">
        </div>       
        <div class="form-group">
    <label for="password">Contraseña</label>
    <div class="password-container">
        <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
        <button type="button" id="togglePassword" class="toggle-password-btn">
            <i class="far fa-eye"></i>
        </button>
    </div>
</div>        
        <button type="submit" class="btn-login">Ingresar</button>        
        <div class="login-links">
          <a href="#" id="forgotPassword">¿Olvidé mi contraseña?</a>
          <a href="#" id="registerLink">Registrate</a>
        </div>
      </form>      
      <div id="message" class="message"></div>
    </div>
  </div>
  
  <!-- Modal de Registro -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div class="modal-header">
            <div class="modal-icon"></div>
            <h3>Registrate</h3>
            <p>Regístrate en nuestro laboratorio clínico</p>
        </div>
        <form id="registerForm">
            <div class="form-row-modern">
                <div class="input-group">
                    <label>DUI</label>
                    <input type="text" id="regDui" placeholder="Ej: 12345678-9" required>
                </div>
                <div class="input-group">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" id="regFechaNacimiento" required>
                </div>
            </div>           
            <div class="form-row-modern">
                <div class="input-group">
                    <label>Nombres</label>
                    <input type="text" id="regNombres" placeholder="Ingresa tus nombres" required>
                </div>
                <div class="input-group">
                    <label>Apellidos</label>
                    <input type="text" id="regApellidos" placeholder="Ingresa tus apellidos" required>
                </div>
            </div>           
            <div class="form-row-modern">
                <div class="input-group">
                    <label>Teléfono</label>
                    <input type="tel" id="regTelefono" placeholder="Ej: 7012-3456" required>
                </div>
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="regEmail" placeholder="tucorreo@ejemplo.com" required>
                </div>
            </div>
            <div class="form-row-single">
            <div class="input-group">
                <label>Contraseña</label>
                <div class="password-container">
                    <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required>
                    <button type="button" class="toggle-reg-password" onclick="toggleRegPassword()">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>
        </div>            
            <div class="form-footer">
                <button type="submit" class="btn-register">Registrarse</button>
                <button type="button" class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
            </div>
        </form>
    </div>
    
      <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/login.js"></script>
</body>
</html>
  
  <!-- Modal de Recuperar Contraseña -->
  <div id="forgotModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Recuperar Contraseña</h3>
      <form id="forgotForm">
        <input type="email" id="forgotEmail" placeholder="Ingresa tu correo electrónico" required>
        <button type="submit">Enviar Instrucciones</button>
      </form>
    </div>
  </div>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="js/login.js"></script>
</body>
</html>
