<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Laboratorio Clínico</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h2>Sistema de Gestión de Pacientes</h2>
      <h3>Laboratorio Clínico</h3>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" required placeholder="Ingresa tu correo">
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
        </div>
        
        <button type="submit" class="btn-login">Ingresar</button>
        
        <div class="login-links">
          <a href="#" id="forgotPassword">¿Olvidé mi contraseña?</a>
          <a href="#" id="registerLink">Registrarse</a>
        </div>
      </form>
      
      <div id="message" class="message"></div>
    </div>
  </div>
  
  <!-- Modal de Registro -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Registro de Nuevo Paciente</h3>
      <form id="registerForm">
        <input type="text" id="regDui" placeholder="DUI (Ej: 12345678-9)" required>
        <input type="text" id="regNombres" placeholder="Nombres" required>
        <input type="text" id="regApellidos" placeholder="Apellidos" required>
        <div class="form-field">
          ////
                    <label for="regFechaNacimiento">📅 Fecha de Nacimiento:</label>
        <input type="date" id="regFechaNacimiento" required>
        <small>Selecciona tu fecha de nacimiento (dd/mm/aaaa)</small>
                </div>
                ///////
        <input type="tel" id="regTelefono" placeholder="Teléfono" required>
        <input type="email" id="regEmail" placeholder="Correo Electrónico" required>
        <input type="password" id="regPassword" placeholder="Contraseña" required>
        <button type="submit">Registrarse</button>
      </form>
    </div>
  </div>

      <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/login.js"></script>
</body>
</html>
  
  <!-- Modal de Recuperar Contraseña -->
  <div id="forgotModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Recuperar Contraseña</h3>
      <form id="forgotForm">
        <input type="email" id="forgotEmail" placeholder="Ingresa tu correo electrónico" required>
        <button type="submit">Enviar Instrucciones</button>
      </form>
    </div>
  </div>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="js/login.js"></script>
</body>
</html>
